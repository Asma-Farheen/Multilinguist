<!-- ===== RESPONSE SCREEN ===== -->
<div id="screen-response" class="screen">
  <div class="response-top-bar">
    <button class="back-btn" id="btn-home">
      <span>←</span>
    </button>
    <div class="response-category-badge" id="response-category-badge">🌾 Farming</div>
    <button class="icon-btn" id="theme-cycle" title="Change Theme">
      <span class="icon">🎨</span>
    </button>
  </div>

  <div class="response-body">
    <!-- Question Box -->
    <div class="question-bubble">
      <span class="q-icon">🗣️</span>
      <p id="question-text"></p>
    </div>

    <!-- Response Card -->
    <div class="response-card">
      <div class="response-avatar">🤖</div>
      <div class="response-text-area">
        <p class="response-text" id="response-text"></p>
      </div>
    </div>

    <!-- Response Image Area -->
    <div class="response-image-box">
      <span class="response-image-emoji" id="response-image-emoji">🌾</span>
    </div>
  </div>

  <!-- Audio Controls Bar -->
  <div class="audio-controls">
    <button class="audio-btn" id="btn-replay">
      <span class="audio-icon">🔊</span>
      <span class="audio-label">Replay</span>
    </button>
    
    <div class="speaking-indicator" id="speaking-indicator">
      <div class="speak-wave"></div>
      <div class="speak-wave"></div>
      <div class="speak-wave"></div>
      <span>Speaking...</span>
    </div>

    <button class="audio-btn" id="new-question-btn">
      <span class="audio-icon">🎤</span>
      <span class="audio-label">Ask Again</span>
    </button>
  </div>
</div>
